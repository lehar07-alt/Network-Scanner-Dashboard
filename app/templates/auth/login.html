{% extends "base_auth.html" %}
{% block title %}Login{% endblock %}

{% block content %}
<div class="auth-card">
    <div class="text-center mb-4">
        <i class="fa-solid fa-shield-halved fa-2x text-primary mb-2"></i>
        <h4>Welcome back</h4>
        <p class="text-secondary">Log in to your NetScan dashboard</p>
    </div>

    <form method="POST">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="mb-3">
            <label class="form-label">Username</label>
            <input type="text" name="username" class="form-control" required autofocus>
        </div>
        <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password" name="password" class="form-control" required>
        </div>
        <div class="d-flex justify-content-between align-items-center mb-3">
            <div class="form-check">
                <input type="checkbox" name="remember" class="form-check-input" id="remember">
                <label class="form-check-label" for="remember">Remember me</label>
            </div>
            <a href="{{ url_for('auth.forgot_password') }}" class="small">Forgot password?</a>
        </div>
        <button type="submit" class="btn btn-primary w-100">Log In</button>
    </form>

    <p class="text-center mt-3 mb-0 small text-secondary">
        Don't have an account? <a href="{{ url_for('auth.register') }}">Register</a>
    </p>
</div>
{% endblock %}
