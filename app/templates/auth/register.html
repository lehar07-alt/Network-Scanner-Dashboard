{% extends "base_auth.html" %}
{% block title %}Register{% endblock %}

{% block content %}
<div class="auth-card">
    <div class="text-center mb-4">
        <i class="fa-solid fa-shield-halved fa-2x text-primary mb-2"></i>
        <h4>Create your account</h4>
        <p class="text-secondary">Start monitoring your network</p>
    </div>

    <form method="POST">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="mb-3">
            <label class="form-label">Username</label>
            <input type="text" name="username" class="form-control" required autofocus>
        </div>
        <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" name="email" class="form-control" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password" name="password" class="form-control" required>
            <div class="form-text">At least 8 characters.</div>
        </div>
        <div class="mb-3">
            <label class="form-label">Confirm Password</label>
            <input type="password" name="confirm_password" class="form-control" required>
        </div>
        <button type="submit" class="btn btn-primary w-100">Create Account</button>
    </form>

    <p class="text-center mt-3 mb-0 small text-secondary">
        Already have an account? <a href="{{ url_for('auth.login') }}">Log in</a>
    </p>
</div>
{% endblock %}
