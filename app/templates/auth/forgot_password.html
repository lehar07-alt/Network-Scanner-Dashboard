{% extends "base_auth.html" %}
{% block title %}Forgot Password{% endblock %}

{% block content %}
<div class="auth-card">
    <div class="text-center mb-4">
        <i class="fa-solid fa-key fa-2x text-primary mb-2"></i>
        <h4>Reset your password</h4>
        <p class="text-secondary">Enter your email and we'll send reset instructions</p>
    </div>

    <form method="POST">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" name="email" class="form-control" required autofocus>
        </div>
        <button type="submit" class="btn btn-primary w-100">Send Reset Instructions</button>
    </form>

    <p class="text-center mt-3 mb-0 small text-secondary">
        <a href="{{ url_for('auth.login') }}"><i class="fa-solid fa-arrow-left me-1"></i>Back to login</a>
    </p>
</div>
{% endblock %}
